name: Migrate DB then Deploy

on:
  push:
    branches: [ main, develop ]

jobs:
  migrate-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v5

      # Supabase CLI セットアップ
      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
        with:
            version: latest

      # config.toml は Auth URL も本番へ反映するため、ローカルURLの混入をCIで止める。
      - name: Validate Supabase Auth URLs
        run: |
          trim_env() {
            local name="$1"
            local value="${!name:-}"
            value="$(printf '%s' "$value" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            printf -v "$name" '%s' "$value"
            export "$name"
          }

          trim_env SUPABASE_AUTH_SITE_URL
          trim_env SUPABASE_AUTH_REDIRECT_URL
          trim_env SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID

          if [ -z "$SUPABASE_AUTH_SITE_URL" ]; then
            echo "::error::SUPABASE_AUTH_SITE_URL is required"
            exit 1
          fi

          if [ -z "$SUPABASE_AUTH_REDIRECT_URL" ]; then
            echo "::error::SUPABASE_AUTH_REDIRECT_URL is required"
            exit 1
          fi

          if printf '%s\n%s\n' "$SUPABASE_AUTH_SITE_URL" "$SUPABASE_AUTH_REDIRECT_URL" | grep -Eiq 'localhost|127\.0\.0\.1'; then
            echo "::error::Supabase Auth URLs must not point to localhost or 127.0.0.1 in CI"
            exit 1
          fi

          if [ "$GITHUB_REF_NAME" = "main" ]; then
            if [ -z "$SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID" ]; then
              echo "::error::SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID is required for production Google login"
              exit 1
            fi

            if [ -z "$SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET" ]; then
              echo "::error::SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET is required for production Google login"
              exit 1
            fi

            if ! printf '%s\n' "$SUPABASE_AUTH_REDIRECT_URL" | grep -Eq '/auth/callback/?$'; then
              echo "::error::SUPABASE_AUTH_REDIRECT_URL must point to the web auth callback path"
              exit 1
            fi
          fi
        env:
          SUPABASE_AUTH_SITE_URL: ${{ secrets.SUPABASE_AUTH_SITE_URL }}
          SUPABASE_AUTH_REDIRECT_URL: ${{ secrets.SUPABASE_AUTH_REDIRECT_URL }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET }}

      # Supabase プロジェクトへリンク（ノンインタラクティブ）
      - name: Supabase link
        run: |
          supabase link --project-ref $SUPABASE_PROJECT_REF --password $SUPABASE_DB_PASSWORD
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_AUTH_SITE_URL: ${{ secrets.SUPABASE_AUTH_SITE_URL }}
          SUPABASE_AUTH_REDIRECT_URL: ${{ secrets.SUPABASE_AUTH_REDIRECT_URL }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET }}

      # マイグレーション適用（idempotent）
      # --yes: CI(非TTY)で確認プロンプト待ちハングを防ぐ（prod に未適用マイグレーションが
      # あると supabase db push が [Y/n] を出して stdin 待ちで停止するため。実際に本番デプロイが
      # db push で数時間ハングした）
      - name: Supabase db push
        run: |
          supabase db push --include-all --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_AUTH_SITE_URL: ${{ secrets.SUPABASE_AUTH_SITE_URL }}
          SUPABASE_AUTH_REDIRECT_URL: ${{ secrets.SUPABASE_AUTH_REDIRECT_URL }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET }}

      - name: Render production Supabase config
        run: |
          ruby <<'RUBY'
          path = "supabase/config.toml"
          site_url = ENV.fetch("SUPABASE_AUTH_SITE_URL").strip
          redirect_url = ENV.fetch("SUPABASE_AUTH_REDIRECT_URL").strip
          google_client_id = ENV["SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID"].to_s.strip
          google_secret = ENV["SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET"].to_s
          google_enabled = !google_client_id.empty? && !google_secret.empty?
          config = File.read(path)
          unless config.sub!(/^site_url = .+$/, "site_url = #{site_url.dump}")
            abort "Failed to render auth.site_url"
          end
          unless config.sub!(
            /^additional_redirect_urls = .+$/,
            "additional_redirect_urls = [#{redirect_url.dump}]"
          )
            abort "Failed to render auth.additional_redirect_urls"
          end
          google_config = <<~TOML.strip
          [auth.external.google]
          enabled = #{google_enabled}
          client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
          secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
          skip_nonce_check = false
          TOML
          unless config.sub!(
            /^\[auth\.external\.google\]\nenabled = .+\nclient_id = .+\nsecret = .+\nskip_nonce_check = .+$/,
            google_config
          )
            abort "Failed to render auth.external.google"
          end
          File.write(path, config)
          RUBY
        env:
          SUPABASE_AUTH_SITE_URL: ${{ secrets.SUPABASE_AUTH_SITE_URL }}
          SUPABASE_AUTH_REDIRECT_URL: ${{ secrets.SUPABASE_AUTH_REDIRECT_URL }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET }}

      - name: Supabase config push
        run: |
          trim_env() {
            local name="$1"
            local value="${!name:-}"
            value="$(printf '%s' "$value" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            printf -v "$name" '%s' "$value"
            export "$name"
          }

          trim_env SUPABASE_AUTH_SITE_URL
          trim_env SUPABASE_AUTH_REDIRECT_URL
          trim_env SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID

          supabase config push --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_AUTH_SITE_URL: ${{ secrets.SUPABASE_AUTH_SITE_URL }}
          SUPABASE_AUTH_REDIRECT_URL: ${{ secrets.SUPABASE_AUTH_REDIRECT_URL }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET }}

      # 成功したら Vercel デプロイを開始
      - name: Trigger Vercel Deploy Hook
        env:
          WEB_VERCEL_DEPLOY_HOOK_URL: ${{ secrets.WEB_VERCEL_DEPLOY_HOOK_URL }}
          ADMIN_VERCEL_DEPLOY_HOOK_URL: ${{ secrets.ADMIN_VERCEL_DEPLOY_HOOK_URL }}
        run: |
          trim_env() {
            local name="$1"
            local value="${!name:-}"
            value="$(printf '%s' "$value" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            printf -v "$name" '%s' "$value"
            export "$name"
          }

          trim_env WEB_VERCEL_DEPLOY_HOOK_URL
          trim_env ADMIN_VERCEL_DEPLOY_HOOK_URL

          if [ -z "$WEB_VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "::error::WEB_VERCEL_DEPLOY_HOOK_URL is required"
            exit 1
          fi

          trigger_deploy_hook() {
            local name="$1"
            local url="$2"
            local max_attempts=4
            local attempt
            local http_code
            local response_file

            response_file="$(mktemp)"

            for attempt in $(seq 1 "$max_attempts"); do
              echo "Triggering ${name} Vercel Deploy Hook (attempt ${attempt}/${max_attempts})..."
              http_code="$(
                curl -sS -o "$response_file" -w "%{http_code}" \
                  --connect-timeout 10 \
                  --max-time 45 \
                  -X POST \
                  "$url" || true
              )"
              if ! [[ "$http_code" =~ ^[0-9]{3}$ ]]; then
                http_code="000"
              fi

              if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
                echo "${name} Vercel Deploy Hook accepted."
                rm -f "$response_file"
                return 0
              fi

              if [ "$http_code" -ge 400 ] && [ "$http_code" -lt 500 ]; then
                echo "::error::${name} Vercel Deploy Hook returned HTTP ${http_code}. Recreate the deploy hook in Vercel and update the GitHub secret."
                rm -f "$response_file"
                return 1
              fi

              echo "::warning::${name} Vercel Deploy Hook returned HTTP ${http_code}; retrying."
              if [ "$attempt" -lt "$max_attempts" ]; then
                sleep $((attempt * 15))
              fi
            done

            echo "::error::${name} Vercel Deploy Hook did not return success after ${max_attempts} attempts."
            rm -f "$response_file"
            return 1
          }

          trigger_deploy_hook "web" "$WEB_VERCEL_DEPLOY_HOOK_URL"

          if [ -n "$ADMIN_VERCEL_DEPLOY_HOOK_URL" ]; then
            trigger_deploy_hook "admin" "$ADMIN_VERCEL_DEPLOY_HOOK_URL"
          else
            echo "ADMIN_VERCEL_DEPLOY_HOOK_URL is not set; skipping admin deploy hook."
          fi
